name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version being released (e.g., 0.8.8)'
        required: true
        type: string
      next_version:
        description: 'Next development version branch to create (e.g., 0.8.9)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout version branch
        uses: actions/checkout@v5
        with:
          ref: version-${{ inputs.version }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches input
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match release input (${{ inputs.version }})"
            exit 1
          fi
          echo "✅ Version verified: $PKG_VERSION"

      - name: Build dev and run tests
        run: npm run compile:dev
        # Build dev output for test runner (tests run against tsc output, not the bundle)

      - name: Run tests
        run: npm run test:server || true
        # Some tests rely on local Windows file paths (Clarion installation, redirection fixtures)
        # and are expected to fail on the Linux CI runner — these are pre-existing environment gaps.
        # We verify tests pass fully locally before triggering a release.

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Merge version branch into master
        run: |
          git checkout master
          git merge version-${{ inputs.version }} --no-ff -m "Release v${{ inputs.version }}: merge version-${{ inputs.version }} into master"
          git push origin master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          draft: false
          prerelease: false
          files: ./clarion-extensions-${{ inputs.version }}.vsix
          generate_release_notes: true
          body: |
            ## Installation

            Download the VSIX file below and install it in VS Code:
            1. Open VS Code
            2. Go to Extensions (Ctrl+Shift+X)
            3. Click "..." menu → "Install from VSIX..."
            4. Select the downloaded file

            ## Marketplace

            This version is also available on the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=msarson.clarion-extensions).

            ## What's New

            See [CHANGELOG.md](https://github.com/msarson/Clarion-Extension/blob/master/CHANGELOG.md) for full details.

      - name: Publish to VS Code Marketplace
        run: vsce publish --pat ${{ secrets.VSCE_PAT }}

      - name: Create next version branch
        run: |
          git checkout master
          git checkout -b version-${{ inputs.next_version }}
          npm version ${{ inputs.next_version }} --no-git-tag-version
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const stub = '### [${{ inputs.next_version }}] - Unreleased\n\n---\n\n';
            const updated = content.replace('## Recent Versions\n\n', '## Recent Versions\n\n' + stub);
            fs.writeFileSync('CHANGELOG.md', updated);
          "
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: Bump version to ${{ inputs.next_version }} and add changelog stub"
          git push origin version-${{ inputs.next_version }}
